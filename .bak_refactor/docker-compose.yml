services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  # Опційно: Redis для розподіленого кешу (REDIS_URL=redis://redis:6379/0).
  # Якщо не потрібен — приберіть цей сервіс і REDIS_URL з .env.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
